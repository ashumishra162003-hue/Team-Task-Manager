<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow — Project Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0b0d14;
  --surface: #12151f;
  --surface2: #181c2a;
  --surface3: #1e2335;
  --border: #252a3d;
  --border2: #2f3550;
  --accent: #6c63ff;
  --accent-hover: #7c74ff;
  --accent-dim: rgba(108,99,255,0.12);
  --success: #4ecca3;
  --success-dim: rgba(78,204,163,0.12);
  --warn: #ffb347;
  --warn-dim: rgba(255,179,71,0.12);
  --danger: #ff6b6b;
  --danger-dim: rgba(255,107,107,0.12);
  --info: #60a5fa;
  --info-dim: rgba(96,165,250,0.12);
  --text: #e4e6f0;
  --text2: #9ba3bf;
  --text3: #5c6480;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

.animate-fade-up { animation: fadeUp 0.35s ease both; }

/* Layout */
.app-layout { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 22px 20px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-section { padding: 8px 14px 4px; font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-radius: var(--radius-sm); margin: 1px 8px; color: var(--text2); font-size: 13px; font-weight: 500; transition: all .18s; cursor: pointer; border: none; background: transparent; width: calc(100% - 16px); text-align: left; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
.sidebar-user { padding: 16px; border-top: 1px solid var(--border); }
.user-info { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); background: var(--surface2); }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 500; }
.user-role { font-size: 10px; font-family: var(--mono); color: var(--text3); }

/* Main content */
.main-content { flex: 1; overflow-y: auto; }
.page { padding: 28px 32px; max-width: 1100px; animation: fadeUp .3s ease; }
.page-header { margin-bottom: 28px; }
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text2); }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.stat-val { font-size: 28px; font-weight: 600; font-family: var(--mono); }
.stat-val.accent { color: var(--accent); }
.stat-val.success { color: var(--success); }
.stat-val.warn { color: var(--warn); }
.stat-val.danger { color: var(--danger); }
.stat-val.info { color: var(--info); }

/* Progress bar */
.progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin-top: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 3px; transition: width .6s ease; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; border: none; transition: all .18s; cursor: pointer; white-space: nowrap; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,107,107,.2); }
.btn-danger:hover { background: rgba(255,107,107,.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.form-input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; outline: none; transition: border-color .18s; }
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

/* Badges */
.badge { display: inline-flex; align-items: center; font-size: 10px; font-family: var(--mono); font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.badge-todo { background: var(--surface3); color: var(--text3); }
.badge-inprogress { background: var(--warn-dim); color: var(--warn); }
.badge-review { background: var(--info-dim); color: var(--info); }
.badge-done { background: var(--success-dim); color: var(--success); }
.badge-low { background: var(--surface3); color: var(--text2); }
.badge-medium { background: var(--info-dim); color: var(--info); }
.badge-high { background: var(--warn-dim); color: var(--warn); }
.badge-urgent { background: var(--danger-dim); color: var(--danger); }
.badge-admin { background: var(--accent-dim); color: var(--accent); }
.badge-member { background: var(--success-dim); color: var(--success); }
.badge-overdue { background: var(--danger-dim); color: var(--danger); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); font-weight: 500; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

/* Task card */
.task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; animation: slideIn .25s ease; transition: border-color .2s; }
.task-card:hover { border-color: var(--border2); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn .2s ease; padding: 16px; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: fadeUp .25s ease; }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }

/* Toast */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.4); animation: fadeUp .3s ease; min-width: 240px; }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Empty */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 13px; border: 1px dashed var(--border); border-radius: var(--radius); }
.empty-icon { font-size: 32px; margin-bottom: 12px; }

/* Spinner */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
.loading-page { display: flex; align-items: center; justify-content: center; height: 100vh; gap: 12px; color: var(--text2); }

.overdue-tag { color: var(--danger); font-size: 11px; font-family: var(--mono); }

/* Project card */
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all .2s; }
.project-card:hover { border-color: var(--accent); transform: translateY(-2px); }

hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.flex-1 { flex: 1; }

/* Auth */
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 16px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 32px; width: 100%; max-width: 420px; }

/* Hidden */
.hidden { display: none !important; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 20px; width: fit-content; }
.tab-btn { padding: 7px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 500; background: transparent; color: var(--text2); transition: all .18s; }
.tab-btn.active { background: var(--surface2); color: var(--text); }

/* Filter pills */
.filter-pills { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 500; background: var(--surface2); color: var(--text2); transition: all .15s; }
.filter-pill.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* Role selector */
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.role-option { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text2); cursor: pointer; text-align: center; font-size: 13px; font-weight: 500; transition: all .18s; }
.role-option.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .page { padding: 20px 16px; }
  .form-row { flex-direction: column; }
}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="auth-page hidden">
  <div class="auth-card animate-fade-up">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
      <div class="logo-icon" style="width:38px;height:38px;font-size:18px">⚡</div>
      <div>
        <div style="font-size:18px;font-weight:600">TaskFlow</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">project manager</div>
      </div>
    </div>
    <div id="auth-title" style="font-size:20px;font-weight:600;margin-bottom:4px">Welcome back 👋</div>
    <div id="auth-sub" style="font-size:13px;color:var(--text2);margin-bottom:24px">Sign in to your workspace</div>

    <div id="signup-username" class="form-group hidden">
      <label class="form-label">Username</label>
      <input class="form-input" id="inp-username" placeholder="johndoe" />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="inp-email" type="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="inp-password" type="password" placeholder="••••••••" />
    </div>
    <div id="signup-role" class="form-group hidden">
      <label class="form-label">Role</label>
      <div class="role-grid">
        <div class="role-option active" id="role-member" onclick="selectRole('member')">👤 Member</div>
        <div class="role-option" id="role-admin" onclick="selectRole('admin')">🛡️ Admin</div>
      </div>
    </div>
    <input type="hidden" id="selected-role" value="member" />

    <button class="btn btn-primary" style="width:100%;margin-top:8px;padding:11px" id="auth-btn" onclick="submitAuth()">Sign In</button>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text2)">
      <span id="auth-toggle-text">Don't have an account?</span>
      <span onclick="toggleAuthMode()" style="color:var(--accent);cursor:pointer;font-weight:500;margin-left:4px" id="auth-toggle-link">Sign up</span>
    </div>
  </div>
</div>

<!-- APP LAYOUT -->
<div id="app-layout" class="app-layout hidden">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">TaskFlow</div>
        <div class="logo-sub">project manager</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Navigation</div>
      <button class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')"><span class="icon">📊</span> Dashboard</button>
      <button class="nav-item" id="nav-projects" onclick="navigate('projects')"><span class="icon">📁</span> Projects</button>
      <button class="nav-item hidden" id="nav-users" onclick="navigate('users')"><span class="icon">👥</span> Users</button>
    </nav>
    <div class="sidebar-user">
      <div class="user-info">
        <div class="avatar" id="sidebar-avatar">TF</div>
        <div style="flex:1;min-width:0">
          <div class="user-name" id="sidebar-username" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
          <div class="user-role" id="sidebar-role"></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()" title="Logout" style="padding:5px 8px">↩</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page hidden"></div>

    <!-- PROJECTS LIST -->
    <div id="page-projects" class="page hidden"></div>

    <!-- PROJECT DETAIL -->
    <div id="page-project-detail" class="page hidden"></div>

    <!-- USERS -->
    <div id="page-users" class="page hidden"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
// ===================== STATE / DB =====================
let DB = {
  users: [],
  projects: [],
  tasks: [],
  members: [], // { project_id, user_id, role }
  nextUserId: 1,
  nextProjectId: 1,
  nextTaskId: 1,
};
let currentUser = null;
let authMode = 'login';
let currentPage = '';
let currentProjectId = null;
let currentTab = 'tasks';
let currentFilter = 'all';

// ===================== PERSIST =====================
function saveDB() {
  try { sessionStorage.setItem('tf_db', JSON.stringify(DB)); } catch(e) {}
}
function loadDB() {
  try {
    const s = sessionStorage.getItem('tf_db');
    if (s) DB = JSON.parse(s);
  } catch(e) {}
}
function saveSession() {
  try { sessionStorage.setItem('tf_user', JSON.stringify(currentUser)); } catch(e) {}
}
function loadSession() {
  try {
    const s = sessionStorage.getItem('tf_user');
    if (s) currentUser = JSON.parse(s);
  } catch(e) {}
}

// ===================== SEED DATA =====================
function seedIfEmpty() {
  if (DB.users.length > 0) return;
  // Create default admin
  const adminId = DB.nextUserId++;
  DB.users.push({ id: adminId, username: 'admin', email: 'admin@demo.com', password: 'admin123', role: 'admin', created_at: new Date().toISOString() });
  // Create member
  const memberId = DB.nextUserId++;
  DB.users.push({ id: memberId, username: 'alice', email: 'alice@demo.com', password: 'alice123', role: 'member', created_at: new Date().toISOString() });

  // Create project
  const p1 = DB.nextProjectId++;
  DB.projects.push({ id: p1, name: 'Website Redesign', description: 'Modernize the company website with new branding', status: 'active', owner_id: adminId, deadline: '2026-06-30', created_at: new Date().toISOString() });
  DB.members.push({ project_id: p1, user_id: adminId, role: 'admin', joined_at: new Date().toISOString() });
  DB.members.push({ project_id: p1, user_id: memberId, role: 'member', joined_at: new Date().toISOString() });

  const p2 = DB.nextProjectId++;
  DB.projects.push({ id: p2, name: 'Mobile App v2', description: 'New features and performance improvements', status: 'active', owner_id: adminId, deadline: '2026-07-15', created_at: new Date().toISOString() });
  DB.members.push({ project_id: p2, user_id: adminId, role: 'admin', joined_at: new Date().toISOString() });

  // Tasks for p1
  const tasks1 = [
    { title: 'Design new homepage', description: 'Create Figma mockups for the new homepage layout', status: 'done', priority: 'high', assignee_id: memberId },
    { title: 'Implement navigation', description: 'Build responsive nav component', status: 'in-progress', priority: 'medium', assignee_id: memberId },
    { title: 'Write copy for about page', description: 'Draft engaging content for About Us section', status: 'todo', priority: 'low', assignee_id: null },
    { title: 'SEO optimization', description: 'Add meta tags and structured data', status: 'review', priority: 'medium', assignee_id: adminId },
    { title: 'Performance audit', description: 'Run Lighthouse and fix issues', status: 'todo', priority: 'urgent', assignee_id: memberId, deadline: '2026-04-01' },
  ];
  tasks1.forEach(t => {
    const tid = DB.nextTaskId++;
    DB.tasks.push({ id: tid, ...t, project_id: p1, creator_id: adminId, deadline: t.deadline || null, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
  });

  // Tasks for p2
  const tasks2 = [
    { title: 'Auth module refactor', description: 'Migrate to new auth provider', status: 'in-progress', priority: 'high', assignee_id: adminId },
    { title: 'Push notifications', status: 'todo', priority: 'medium', assignee_id: null },
    { title: 'Onboarding flow', status: 'done', priority: 'high', assignee_id: adminId },
  ];
  tasks2.forEach(t => {
    const tid = DB.nextTaskId++;
    DB.tasks.push({ id: tid, ...t, description: t.description || '', project_id: p2, creator_id: adminId, deadline: null, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
  });

  saveDB();
}

// ===================== AUTH =====================
function selectRole(role) {
  document.getElementById('selected-role').value = role;
  document.getElementById('role-member').classList.toggle('active', role === 'member');
  document.getElementById('role-admin').classList.toggle('active', role === 'admin');
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  const isLogin = authMode === 'login';
  document.getElementById('auth-title').textContent = isLogin ? 'Welcome back 👋' : 'Create account';
  document.getElementById('auth-sub').textContent = isLogin ? 'Sign in to your workspace' : 'Start managing your projects';
  document.getElementById('signup-username').classList.toggle('hidden', isLogin);
  document.getElementById('signup-role').classList.toggle('hidden', isLogin);
  document.getElementById('auth-btn').textContent = isLogin ? 'Sign In' : 'Create Account';
  document.getElementById('auth-toggle-text').textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('auth-toggle-link').textContent = isLogin ? 'Sign up' : 'Sign in';
}

function submitAuth() {
  const email = document.getElementById('inp-email').value.trim().toLowerCase();
  const password = document.getElementById('inp-password').value;

  if (authMode === 'login') {
    const user = DB.users.find(u => u.email === email && u.password === password);
    if (!user) { showToast('Invalid credentials', 'error'); return; }
    currentUser = { id: user.id, username: user.username, email: user.email, role: user.role };
    saveSession();
    showApp();
  } else {
    const username = document.getElementById('inp-username').value.trim();
    const role = document.getElementById('selected-role').value;
    if (!username) { showToast('Username required', 'error'); return; }
    if (!email) { showToast('Email required', 'error'); return; }
    if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
    if (DB.users.find(u => u.email === email)) { showToast('Email already taken', 'error'); return; }
    if (DB.users.find(u => u.username === username)) { showToast('Username already taken', 'error'); return; }
    const id = DB.nextUserId++;
    DB.users.push({ id, username, email, password, role, created_at: new Date().toISOString() });
    saveDB();
    currentUser = { id, username, email, role };
    saveSession();
    showApp();
  }
}

function logout() {
  currentUser = null;
  try { sessionStorage.removeItem('tf_user'); } catch(e) {}
  showAuth();
}

// ===================== ROUTING =====================
function showAuth() {
  document.getElementById('auth-page').classList.remove('hidden');
  document.getElementById('app-layout').classList.add('hidden');
}

function showApp() {
  document.getElementById('auth-page').classList.add('hidden');
  document.getElementById('app-layout').classList.remove('hidden');
  // Update sidebar
  document.getElementById('sidebar-avatar').textContent = currentUser.username.slice(0, 2).toUpperCase();
  document.getElementById('sidebar-username').textContent = currentUser.username;
  document.getElementById('sidebar-role').textContent = currentUser.role;
  // Show/hide admin nav
  document.getElementById('nav-users').classList.toggle('hidden', currentUser.role !== 'admin');
  navigate('dashboard');
}

function navigate(page, projectId) {
  currentPage = page;
  if (projectId) currentProjectId = projectId;

  // Update nav active states
  ['dashboard','projects','users'].forEach(p => {
    const el = document.getElementById('nav-' + p);
    if (el) el.classList.toggle('active', p === page || (p === 'projects' && page === 'project-detail'));
  });

  // Hide all pages
  ['dashboard','projects','project-detail','users'].forEach(p => {
    document.getElementById('page-' + p).classList.add('hidden');
  });

  const el = document.getElementById('page-' + page);
  el.classList.remove('hidden');

  if (page === 'dashboard') renderDashboard();
  else if (page === 'projects') renderProjects();
  else if (page === 'project-detail') renderProjectDetail();
  else if (page === 'users') renderUsers();
}

// ===================== HELPERS =====================
function isAdmin() { return currentUser && currentUser.role === 'admin'; }

function isOverdue(deadline, status) {
  return deadline && new Date(deadline) < new Date() && status !== 'done';
}

function statusBadge(s) {
  const cls = { 'todo': 'badge-todo', 'in-progress': 'badge-inprogress', 'review': 'badge-review', 'done': 'badge-done' };
  return `<span class="badge ${cls[s]||'badge-todo'}">${s}</span>`;
}

function priorityBadge(p) {
  const cls = { low: 'badge-low', medium: 'badge-medium', high: 'badge-high', urgent: 'badge-urgent' };
  return `<span class="badge ${cls[p]||'badge-low'}">${p}</span>`;
}

function pct(done, total) { return total ? Math.round(done / total * 100) : 0; }

function getProjectTasks(pid) { return DB.tasks.filter(t => t.project_id === pid); }
function getProjectMembers(pid) {
  return DB.members.filter(m => m.project_id === pid).map(m => {
    const u = DB.users.find(u => u.id === m.user_id);
    return u ? { ...u, project_role: m.role, joined_at: m.joined_at } : null;
  }).filter(Boolean);
}
function getUserProjects(uid) {
  if (isAdmin()) return DB.projects;
  return DB.projects.filter(p => DB.members.some(m => m.project_id === p.id && m.user_id === uid));
}

// ===================== TOAST =====================
function showToast(msg, type = 'success') {
  const colors = { success: '#4ecca3', error: '#ff6b6b', info: '#60a5fa', warn: '#ffb347' };
  const id = 'toast-' + Date.now();
  const div = document.createElement('div');
  div.className = 'toast';
  div.id = id;
  div.innerHTML = `<div class="toast-dot" style="background:${colors[type]||colors.info}"></div>${msg}`;
  document.getElementById('toast-container').appendChild(div);
  setTimeout(() => { const el = document.getElementById(id); if (el) el.remove(); }, 3000);
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const projects = getUserProjects(currentUser.id);
  const allTasks = isAdmin()
    ? DB.tasks
    : DB.tasks.filter(t => t.assignee_id === currentUser.id);

  const stats = {
    total: allTasks.length,
    todo: allTasks.filter(t => t.status === 'todo').length,
    in_progress: allTasks.filter(t => t.status === 'in-progress').length,
    review: allTasks.filter(t => t.status === 'review').length,
    done: allTasks.filter(t => t.status === 'done').length,
  };
  const overdueTasks = allTasks.filter(t => isOverdue(t.deadline, t.status)).slice(0, 10);
  const recentTasks = [...allTasks].sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at)).slice(0, 8);
  const p = pct(stats.done, stats.total);

  const projectCards = projects.slice(0, 6).map(proj => {
    const tasks = getProjectTasks(proj.id);
    const done = tasks.filter(t => t.status === 'done').length;
    const pp = pct(done, tasks.length);
    const members = getProjectMembers(proj.id);
    return `
      <div class="task-card" style="cursor:pointer" onclick="navigate('project-detail', ${proj.id})">
        <div class="flex justify-between items-center" style="margin-bottom:6px">
          <div style="font-weight:500;font-size:13px">${esc(proj.name)}</div>
          <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${pp}%</span>
        </div>
        <div class="progress-bar" style="margin-top:0"><div class="progress-fill" style="width:${pp}%"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">${tasks.length} tasks · ${members.length} members</div>
      </div>`;
  }).join('');

  const recentCards = recentTasks.map(t => {
    const proj = DB.projects.find(p => p.id === t.project_id);
    return `
      <div class="task-card" style="cursor:pointer" onclick="navigate('project-detail', ${t.project_id})">
        <div class="flex justify-between items-center gap-2">
          <div style="font-weight:500;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</div>
          ${statusBadge(t.status)}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;display:flex;gap:8px;align-items:center">
          <span>📁 ${esc(proj?.name || '')}</span>
          ${priorityBadge(t.priority)}
          ${isOverdue(t.deadline, t.status) ? '<span class="overdue-tag">⚠ overdue</span>' : ''}
        </div>
      </div>`;
  }).join('');

  const overdueTable = overdueTasks.length ? `
    <div class="card" style="margin-top:20px;border-color:rgba(255,107,107,.2)">
      <div style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--danger)">⚠ Overdue Tasks (${overdueTasks.length})</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Task</th><th>Project</th><th>Due</th><th>Priority</th></tr></thead>
          <tbody>
            ${overdueTasks.map(t => {
              const proj = DB.projects.find(p => p.id === t.project_id);
              const assignee = DB.users.find(u => u.id === t.assignee_id);
              return `<tr style="cursor:pointer" onclick="navigate('project-detail', ${t.project_id})">
                <td style="color:var(--text);font-weight:500">${esc(t.title)}</td>
                <td>${esc(proj?.name || '')}</td>
                <td class="overdue-tag">${t.deadline}</td>
                <td>${priorityBadge(t.priority)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>` : '';

  document.getElementById('page-dashboard').innerHTML = `
    <div class="page-header">
      <div class="page-title">Good to see you, ${esc(currentUser.username)} 👋</div>
      <div class="page-sub">Here's what's happening with your projects</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-val accent">${stats.total}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono)">${p}% complete</div>
      </div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-val warn">${stats.in_progress}</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val success">${stats.done}</div></div>
      <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-val danger">${overdueTasks.length}</div></div>
      <div class="stat-card"><div class="stat-label">Projects</div><div class="stat-val accent">${projects.length}</div></div>
      <div class="stat-card"><div class="stat-label">Under Review</div><div class="stat-val info">${stats.review}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block"></span>Recent Tasks
        </div>
        ${recentCards || '<div class="empty" style="padding:24px"><div>No tasks yet</div></div>'}
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block"></span>Your Projects
        </div>
        ${projectCards || '<div class="empty" style="padding:24px"><div>No projects yet</div></div>'}
      </div>
    </div>
    ${overdueTable}
  `;
}

// ===================== PROJECTS =====================
function renderProjects() {
  const projects = getUserProjects(currentUser.id);

  const cards = projects.map(p => {
    const tasks = getProjectTasks(p.id);
    const done = tasks.filter(t => t.status === 'done').length;
    const pp = pct(done, tasks.length);
    const members = getProjectMembers(p.id);
    const statusColor = { active: 'var(--success)', archived: 'var(--text3)', completed: 'var(--accent)' };
    const overdue = new Date(p.deadline) < new Date();
    return `
      <div class="project-card" onclick="navigate('project-detail', ${p.id})">
        <div class="flex justify-between items-center" style="margin-bottom:10px">
          <div style="font-weight:600;font-size:15px">${esc(p.name)}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="width:7px;height:7px;border-radius:50%;background:${statusColor[p.status]||'var(--text3)'};display:inline-block"></span>
            ${isAdmin() ? `<button class="btn btn-danger btn-sm" style="padding:3px 8px;font-size:11px" onclick="event.stopPropagation();deleteProject(${p.id})">Del</button>` : ''}
          </div>
        </div>
        ${p.description ? `<div style="font-size:12px;color:var(--text2);margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.description)}</div>` : ''}
        <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pp}%"></div></div>
        <div class="flex justify-between" style="font-size:11px;color:var(--text3)">
          <span>${tasks.length} tasks · ${pp}% done</span>
          <span>👥 ${members.length}</span>
        </div>
        ${p.deadline ? `<div style="font-size:11px;color:${overdue?'var(--danger)':'var(--text3)'};margin-top:8px">📅 ${p.deadline}</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('page-projects').innerHTML = `
    <div class="page-header flex justify-between items-center">
      <div>
        <div class="page-title">Projects</div>
        <div class="page-sub">${projects.length} project${projects.length !== 1 ? 's' : ''} total</div>
      </div>
      ${isAdmin() ? `<button class="btn btn-primary" onclick="showNewProjectModal()">+ New Project</button>` : ''}
    </div>
    ${projects.length === 0
      ? `<div class="empty"><div class="empty-icon">📁</div><div style="font-weight:500;margin-bottom:4px">No projects yet</div>${isAdmin() ? '<div style="color:var(--text3)">Create your first project to get started</div>' : ''}</div>`
      : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">${cards}</div>`
    }
  `;
}

function deleteProject(id) {
  if (!confirm('Delete this project? All tasks will be deleted too.')) return;
  DB.projects = DB.projects.filter(p => p.id !== id);
  DB.tasks = DB.tasks.filter(t => t.project_id !== id);
  DB.members = DB.members.filter(m => m.project_id !== id);
  saveDB();
  showToast('Project deleted', 'warn');
  renderProjects();
}

function showNewProjectModal() {
  const modal = createModal('New Project', `
    <div class="form-group">
      <label class="form-label">Project Name *</label>
      <input class="form-input" id="mp-name" placeholder="e.g. Website Redesign" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="mp-desc" rows="3" placeholder="Brief description..." style="resize:vertical"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Deadline</label>
      <input class="form-input" id="mp-deadline" type="date" />
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="createProject()">Create Project</button>
    </div>
  `);
  document.body.appendChild(modal);
}

function createProject() {
  const name = document.getElementById('mp-name').value.trim();
  const desc = document.getElementById('mp-desc').value.trim();
  const deadline = document.getElementById('mp-deadline').value;
  if (!name) { showToast('Project name required', 'error'); return; }
  const id = DB.nextProjectId++;
  DB.projects.push({ id, name, description: desc, status: 'active', owner_id: currentUser.id, deadline: deadline || null, created_at: new Date().toISOString() });
  DB.members.push({ project_id: id, user_id: currentUser.id, role: 'admin', joined_at: new Date().toISOString() });
  saveDB();
  closeModal();
  showToast('Project created!');
  renderProjects();
}

// ===================== PROJECT DETAIL =====================
function renderProjectDetail() {
  const project = DB.projects.find(p => p.id === currentProjectId);
  if (!project) { navigate('projects'); return; }

  const tasks = getProjectTasks(currentProjectId);
  const members = getProjectMembers(currentProjectId);
  const myRole = DB.members.find(m => m.project_id === currentProjectId && m.user_id === currentUser.id)?.role || (isAdmin() ? 'admin' : 'member');
  const canManage = myRole === 'admin' || isAdmin();
  const pp = pct(tasks.filter(t => t.status === 'done').length, tasks.length);

  const filteredTasks = currentFilter === 'all' ? tasks : tasks.filter(t => t.status === currentFilter);

  const tasksList = filteredTasks.length === 0
    ? `<div class="empty"><div class="empty-icon">✅</div><div>No tasks${currentFilter !== 'all' ? ` with status "${currentFilter}"` : ' yet'}</div></div>`
    : filteredTasks.map(t => {
        const assignee = DB.users.find(u => u.id === t.assignee_id);
        const creator = DB.users.find(u => u.id === t.creator_id);
        const canDelete = canManage || t.creator_id === currentUser.id;
        return `
          <div class="task-card">
            <div class="flex justify-between items-center" style="margin-bottom:6px">
              <div style="font-weight:500;font-size:14px;flex:1">${esc(t.title)}</div>
              <div class="flex items-center gap-2">
                ${priorityBadge(t.priority)}
                ${statusBadge(t.status)}
                ${isOverdue(t.deadline, t.status) ? '<span class="badge badge-overdue">overdue</span>' : ''}
              </div>
            </div>
            ${t.description ? `<div style="font-size:12px;color:var(--text2);margin-bottom:8px">${esc(t.description)}</div>` : ''}
            <div class="flex justify-between items-center" style="margin-top:8px">
              <div style="font-size:11px;color:var(--text3);display:flex;gap:12px">
                ${assignee ? `<span>👤 ${esc(assignee.username)}</span>` : ''}
                ${creator ? `<span>✍ ${esc(creator.username)}</span>` : ''}
                ${t.deadline ? `<span style="color:${isOverdue(t.deadline, t.status)?'var(--danger)':'var(--text3)'}">📅 ${t.deadline}</span>` : ''}
              </div>
              <div class="flex gap-2">
                <select onchange="quickStatus(${t.id}, this.value)" style="font-size:11px;padding:3px 8px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--mono);cursor:pointer">
                  ${['todo','in-progress','review','done'].map(s => `<option value="${s}" ${t.status===s?'selected':''}>${s}</option>`).join('')}
                </select>
                <button class="btn btn-ghost btn-sm" style="padding:4px 10px" onclick="openEditTask(${t.id})">✎</button>
                ${canDelete ? `<button class="btn btn-danger btn-sm" style="padding:4px 10px" onclick="deleteTask(${t.id})">✕</button>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

  const membersTable = `
    <div>
      ${canManage && isAdmin() ? `<div style="margin-bottom:16px"><button class="btn btn-primary btn-sm" onclick="showAddMemberModal()">+ Add Member</button></div>` : ''}
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>User</th><th>Email</th><th>Project Role</th><th>Joined</th>${canManage ? '<th></th>' : ''}</tr></thead>
            <tbody>
              ${members.map(m => `
                <tr>
                  <td><div class="flex items-center gap-2">
                    <div class="avatar" style="width:28px;height:28px;font-size:11px">${m.username.slice(0,2).toUpperCase()}</div>
                    <span style="color:var(--text);font-weight:500">${esc(m.username)}</span>
                  </div></td>
                  <td>${esc(m.email)}</td>
                  <td><span class="badge badge-${m.project_role}">${m.project_role}</span></td>
                  <td style="font-family:var(--mono);font-size:11px">${(m.joined_at||'').slice(0,10)}</td>
                  ${canManage ? `<td>${m.id !== currentUser.id ? `<button class="btn btn-danger btn-sm" style="padding:3px 8px" onclick="removeMember(${m.id})">Remove</button>` : ''}</td>` : ''}
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;

  const STATUSES = ['todo','in-progress','review','done'];

  document.getElementById('page-project-detail').innerHTML = `
    <div style="margin-bottom:24px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;cursor:pointer" onclick="navigate('projects')">← Projects</div>
      <div class="flex justify-between items-center">
        <div>
          <div class="page-title">${esc(project.name)}</div>
          ${project.description ? `<div class="page-sub">${esc(project.description)}</div>` : ''}
        </div>
        <button class="btn btn-primary" onclick="openAddTask()">+ Add Task</button>
      </div>
    </div>

    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val accent">${tasks.length}</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-val warn">${tasks.filter(t=>t.status==='in-progress').length}</div></div>
      <div class="stat-card"><div class="stat-label">Done</div><div class="stat-val success">${tasks.filter(t=>t.status==='done').length}</div></div>
      <div class="stat-card"><div class="stat-label">Completion</div><div class="stat-val accent">${pp}%</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn ${currentTab==='tasks'?'active':''}" onclick="switchTab('tasks')">✅ Tasks (${tasks.length})</button>
      <button class="tab-btn ${currentTab==='members'?'active':''}" onclick="switchTab('members')">👥 Members (${members.length})</button>
    </div>

    <div id="tab-tasks" ${currentTab!=='tasks'?'style="display:none"':''}>
      <div class="filter-pills">
        ${['all',...STATUSES].map(s => `<button class="filter-pill ${currentFilter===s?'active':''}" onclick="setFilter('${s}')">${s==='all'?`All (${tasks.length})`:`${s} (${tasks.filter(t=>t.status===s).length})`}</button>`).join('')}
      </div>
      ${tasksList}
    </div>
    <div id="tab-members" ${currentTab!=='members'?'style="display:none"':''}>
      ${membersTable}
    </div>
  `;
}

function switchTab(tab) {
  currentTab = tab;
  renderProjectDetail();
}

function setFilter(f) {
  currentFilter = f;
  renderProjectDetail();
}

function quickStatus(taskId, status) {
  const task = DB.tasks.find(t => t.id === taskId);
  if (task) { task.status = status; task.updated_at = new Date().toISOString(); saveDB(); renderProjectDetail(); }
}

function deleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  DB.tasks = DB.tasks.filter(t => t.id !== taskId);
  saveDB();
  showToast('Task deleted', 'warn');
  renderProjectDetail();
}

function openAddTask() {
  const project = DB.projects.find(p => p.id === currentProjectId);
  const members = getProjectMembers(currentProjectId);
  showTaskModal(null, members);
}

function openEditTask(taskId) {
  const task = DB.tasks.find(t => t.id === taskId);
  const members = getProjectMembers(currentProjectId);
  showTaskModal(task, members);
}

function showTaskModal(task, members) {
  const isEdit = !!task;
  const STATUSES = ['todo','in-progress','review','done'];
  const PRIORITIES = ['low','medium','high','urgent'];
  const modal = createModal(isEdit ? 'Edit Task' : 'New Task', `
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="mt-title" placeholder="What needs to be done?" value="${isEdit ? esc(task.title) : ''}" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="mt-desc" rows="2" style="resize:vertical">${isEdit ? esc(task.description||'') : ''}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="mt-status">
          ${STATUSES.map(s => `<option value="${s}" ${(isEdit&&task.status===s)||(!isEdit&&s==='todo')?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-input" id="mt-priority">
          ${PRIORITIES.map(p => `<option value="${p}" ${(isEdit&&task.priority===p)||(!isEdit&&p==='medium')?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Assign to</label>
        <select class="form-input" id="mt-assignee">
          <option value="">— Unassigned —</option>
          ${members.map(m => `<option value="${m.id}" ${isEdit&&task.assignee_id===m.id?'selected':''}>${esc(m.username)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Deadline</label>
        <input class="form-input" id="mt-deadline" type="date" value="${isEdit ? (task.deadline||'') : ''}" />
      </div>
    </div>
    <div class="flex gap-2" style="margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveTask(${isEdit ? task.id : 'null'})">${isEdit ? 'Save Changes' : 'Create Task'}</button>
    </div>
  `);
  document.body.appendChild(modal);
}

function saveTask(taskId) {
  const title = document.getElementById('mt-title').value.trim();
  const desc = document.getElementById('mt-desc').value.trim();
  const status = document.getElementById('mt-status').value;
  const priority = document.getElementById('mt-priority').value;
  const assigneeVal = document.getElementById('mt-assignee').value;
  const deadline = document.getElementById('mt-deadline').value;
  if (!title) { showToast('Task title required', 'error'); return; }
  const assignee_id = assigneeVal ? parseInt(assigneeVal) : null;

  if (taskId) {
    const task = DB.tasks.find(t => t.id === taskId);
    if (task) { Object.assign(task, { title, description: desc, status, priority, assignee_id, deadline: deadline||null, updated_at: new Date().toISOString() }); }
    showToast('Task updated!');
  } else {
    const id = DB.nextTaskId++;
    DB.tasks.push({ id, title, description: desc, status, priority, project_id: currentProjectId, assignee_id, creator_id: currentUser.id, deadline: deadline||null, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
    showToast('Task created!');
  }
  saveDB();
  closeModal();
  renderProjectDetail();
}

function showAddMemberModal() {
  const members = getProjectMembers(currentProjectId);
  const memberIds = new Set(members.map(m => m.id));
  const available = DB.users.filter(u => !memberIds.has(u.id));

  const modal = createModal('Add Member', `
    <div class="form-group">
      <label class="form-label">User</label>
      <select class="form-input" id="mm-user">
        <option value="">Select a user...</option>
        ${available.map(u => `<option value="${u.id}">${esc(u.username)} (${esc(u.email)})</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Project Role</label>
      <select class="form-input" id="mm-role">
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="flex gap-2" style="margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="addMember()">Add Member</button>
    </div>
  `);
  document.body.appendChild(modal);
}

function addMember() {
  const userId = parseInt(document.getElementById('mm-user').value);
  const role = document.getElementById('mm-role').value;
  if (!userId) { showToast('Select a user', 'error'); return; }
  if (DB.members.find(m => m.project_id === currentProjectId && m.user_id === userId)) {
    showToast('User is already a member', 'error'); return;
  }
  DB.members.push({ project_id: currentProjectId, user_id: userId, role, joined_at: new Date().toISOString() });
  saveDB();
  closeModal();
  showToast('Member added!');
  renderProjectDetail();
}

function removeMember(userId) {
  if (!confirm('Remove this member?')) return;
  DB.members = DB.members.filter(m => !(m.project_id === currentProjectId && m.user_id === userId));
  saveDB();
  showToast('Member removed', 'warn');
  renderProjectDetail();
}

// ===================== USERS =====================
function renderUsers() {
  if (!isAdmin()) {
    document.getElementById('page-users').innerHTML = `<div class="empty"><div class="empty-icon">🔒</div><div>Admin access required</div></div>`;
    return;
  }

  const rows = DB.users.map(u => `
    <tr>
      <td><div class="flex items-center gap-2">
        <div class="avatar" style="width:30px;height:30px;font-size:11px">${u.username.slice(0,2).toUpperCase()}</div>
        <div>
          <div style="color:var(--text);font-weight:500;font-size:13px">${esc(u.username)}</div>
          ${u.id === currentUser.id ? '<div style="font-size:10px;color:var(--accent);font-family:var(--mono)">you</div>' : ''}
        </div>
      </div></td>
      <td style="font-family:var(--mono);font-size:12px">${esc(u.email)}</td>
      <td><span class="badge badge-${u.role}">${u.role}</span></td>
      <td style="font-family:var(--mono);font-size:11px">${(u.created_at||'').slice(0,10)}</td>
      <td>${u.id !== currentUser.id ? `
        <button class="btn btn-sm ${u.role==='admin'?'btn-ghost':'btn-primary'}" style="font-size:11px"
          onclick="changeUserRole(${u.id}, '${u.role==='admin'?'member':'admin'}')">
          Make ${u.role==='admin'?'Member':'Admin'}
        </button>` : ''}
      </td>
    </tr>`).join('');

  document.getElementById('page-users').innerHTML = `
    <div class="page-header">
      <div class="page-title">Users</div>
      <div class="page-sub">${DB.users.length} registered user${DB.users.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function changeUserRole(id, role) {
  const user = DB.users.find(u => u.id === id);
  if (user) { user.role = role; saveDB(); showToast(`Role updated to ${role}`); renderUsers(); }
}

// ===================== MODAL HELPERS =====================
function createModal(title, content) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'active-modal';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `
    <div class="modal">
      <div class="flex justify-between items-center" style="margin-bottom:20px">
        <div class="modal-title" style="margin:0">${title}</div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      ${content}
    </div>`;
  return overlay;
}

function closeModal() {
  const m = document.getElementById('active-modal');
  if (m) m.remove();
}

// ===================== UTILS =====================
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
